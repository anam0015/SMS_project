<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <style>
        .navbar { background-color: #343a40; }
        .navbar-brand { font-weight: bold; color: white !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="{% url 'home' %}">Student Management System</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home-get-stud' %}">Students</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home-insert' %}">Add Student</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home-signup' %}">Signup</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home-login' %}">Login</a></li>
                <li class="nav-item"><a class="nav-link btn btn-danger text-white" href="{% url 'home-logout' %}">Logout</a></li>
            </ul>
        </div>
    </nav>

    <H1>Welcome to update page</h1><br>
<form method="POST" action="{% url 'home-update' data.roll %}">
    {% csrf_token %}
    
    Roll: <input type="text" name="roll" value="{{data.roll}}"><br><br>
    Name: <input type="text" name="name" value="{{data.s_name}}"><br><br>
    Subject: <input type="text" name="sub" value="{{data.subject}}"><br><br>
    Marks: <input type="text" name="mks" value="{{data.marks}}"><br><br>

    <button type="submit"  class="btn btn-warning">Update</button>
</form>
</body>
