{% extends 'stud_app/base.html' %}

{% block title %}Add Student - SMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4 bg-white">
            <h2 class="mb-4">Add Student</h2>
            <form action="{% url 'home-insert' %}" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Roll</label>
                    <input class="form-control" type="text" name="roll" placeholder="Enter student roll_no" required>
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input class="form-control" type="text" name="name" placeholder="Enter student Name" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input class="form-control" type="text" name="sub" placeholder="Enter student's Subject" required>
                </div>
                <div class="form-group">
                    <label>Marks</label>
                    <input class="form-control" type="number" name="mks" placeholder="Enter student Marks" required>
                </div>
                <button class="btn btn-primary" type="submit">Save Student</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
