<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-button:hover {
            transform: translateY(-2px);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #d32f2f;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .footer-text {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }

        .footer-text a {
            color: #667eea;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="position:fixed;top:0;width:100%;z-index:1000;">
        <a class="navbar-brand" href="{% url 'home' %}">SMS</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"> <span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home-get-stud' %}">Students</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home-insert' %}">Add</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home-signup' %}">Signup</a></li>
                <li class="nav-item"><a class="nav-link btn btn-danger text-white" href="{% url 'home-logout' %}">Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="login-container" style="margin-top:90px;">
        <h1>Login</h1>

        {% if error %}
            <div class="error-message show">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'home-login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">Username</label>
                <input 
                    type="text" 
                    id="id_username" 
                    name="username" 
                    placeholder="Enter your username" 
                    minlength="3"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input 
                    type="password" 
                    id="id_password" 
                    name="password" 
                    placeholder="Enter your password" 
                    minlength="4"
                    required
                >
            </div>

            <button type="submit" class="login-button">Login</button>
        </form>

        <div class="footer-text">
            Welcome to Student Management System
        </div>
    </div>
</body>
</html>
